name: Update plugins

on:
  schedule:
    - cron: '0 7 * * 1'  # Mondays at 07:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jetify-com/devbox-install-action@v0.11.0
        with:
          enable-cache: true

      - uses: extractions/setup-just@v2

      - name: Bump plugin pins
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: just update plugins

      - name: Open PR if changed
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/bump-plugin-pins
          delete-branch: true
          title: Bump plugin pins to latest upstream
          commit-message: |
            Bump plugin pins to latest upstream

            Type: chore
            Scope: plugins
            Why: scheduled sync to track upstream releases for url-source plugins
          body: |
            Automated weekly bump of `marketplace.json` plugin pins
            (`ref` + `sha`) for url-source GitHub plugins.

            Reproduce locally: `just update plugins`.
